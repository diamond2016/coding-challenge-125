<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Green accent for additions -->
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
    
    <!-- Red accent for deletions -->
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec7063;stop-opacity:1" />
    </linearGradient>
    
    <!-- Icon shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Left document (original) -->
  <g transform="translate(20, 10)">
    <rect x="0" y="0" width="45" height="40" rx="4" fill="url(#bgGradient)" filter="url(#shadow)"/>
    <rect x="5" y="5" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="10" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="15" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="20" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="25" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="30" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="35" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    
    <!-- Red strikethrough line (deletions) -->
    <line x1="8" y1="18" x2="43" y2="18" stroke="url(#redGradient)" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Comparison symbol -->
  <g transform="translate(75, 15)">
    <path d="M10 25 L20 25" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
    <path d="M20 25 L30 25" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
    <path d="M30 25 L40 25" stroke="#3498db" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Right document (modified) -->
  <g transform="translate(115, 10)">
    <rect x="0" y="0" width="45" height="40" rx="4" fill="url(#bgGradient)" filter="url(#shadow)"/>
    <rect x="5" y="5" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="10" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="15" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="20" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="25" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="30" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    <rect x="5" y="35" width="35" height="3" rx="1.5" fill="#ecf0f1"/>
    
    <!-- Green plus line (additions) -->
    <line x1="8" y1="22" x2="43" y2="22" stroke="url(#greenGradient)" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Text label -->
  <text x="170" y="38" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#ecf0f1">
    Diff
  </text>
</svg>